---
name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish to Modrinth and GitHub
        required: true
        default: false
        type: boolean

permissions: {}

jobs:
  release:
    if: github.triggering_actor == github.repository_owner && github.ref == 'refs/heads/main'
    name: 🚀 Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write # create the release, tag, and upload release assets
    environment: release
    concurrency:
      group: release
      cancel-in-progress: false
    steps:
      - name: Check out code from GitHub
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Read versions
        id: version
        run: |
          mod=$(sed -n 's/^mod_version=//p' gradle.properties)
          mc=$(sed -n 's/^minecraft_version=//p' gradle.properties)
          test -n "$mod"
          test -n "$mc"
          echo "mod=$mod" >> "$GITHUB_OUTPUT"
          echo "mc=$mc" >> "$GITHUB_OUTPUT"
      - name: Check for existing releases
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
          MOD: ${{ steps.version.outputs.mod }}
          MC: ${{ steps.version.outputs.mc }}
        run: |
          tag="v${MOD}+mc${MC}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "${tag} already has a GitHub release; upload will be skipped"
            echo "github_exists=true" >> "$GITHUB_OUTPUT"
          else
            set +e
            git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null
            tag_status=$?
            set -e
            case "$tag_status" in
              0)
                echo "${tag} exists without a release; refusing to retarget it" >&2
                exit 1
                ;;
              2)
                echo "github_exists=false" >> "$GITHUB_OUTPUT"
                ;;
              *)
                echo "GitHub tag lookup failed" >&2
                exit 1
                ;;
            esac
          fi

          mr_status=$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
            "https://api.modrinth.com/v2/project/e4Vpm1dD/version/${MOD}%2Bmc${MC}")
          case "$mr_status" in
            200)
              echo "${MOD}+mc${MC} already exists on Modrinth; upload will be skipped"
              echo "modrinth_exists=true" >> "$GITHUB_OUTPUT"
              ;;
            404)
              echo "modrinth_exists=false" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Modrinth release check failed with HTTP ${mr_status}" >&2
              exit 1
              ;;
          esac
      - name: Set up JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: 21
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-provider: basic
      - name: Build
        run: ./gradlew build --console=plain
      - name: Run gametest
        run: ./gradlew runGametest --console=plain
      - name: Generate release notes
        run: ./gradlew writeReleaseNotes --console=plain
      - name: Validate release files
        env:
          MOD: ${{ steps.version.outputs.mod }}
          MC: ${{ steps.version.outputs.mc }}
        run: |
          test -s build/release-notes.md
          test -s "build/libs/enchanttweaker-${MOD}+mc${MC}.jar"
          test -s "build/libs/enchanttweaker-${MOD}+mc${MC}-sources.jar"
      - name: Dry-run Modrinth publication
        if: inputs.publish != true
        run: ./gradlew modrinth --console=plain
      - name: Publish to Modrinth
        if: inputs.publish == true && steps.gate.outputs.modrinth_exists == 'false'
        run: ./gradlew modrinth -Prelease --console=plain
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
      - name: Create GitHub release
        if: inputs.publish == true && steps.gate.outputs.github_exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          MOD: ${{ steps.version.outputs.mod }}
          MC: ${{ steps.version.outputs.mc }}
        run: >
          gh release create "v${MOD}+mc${MC}"
          --target "$GITHUB_SHA"
          --title "Enchant Tweaker ${MOD}+mc${MC}"
          --notes-file build/release-notes.md
          build/libs/enchanttweaker-${MOD}+mc${MC}.jar
          build/libs/enchanttweaker-${MOD}+mc${MC}-sources.jar
      - name: Report dry run
        if: inputs.publish != true
        run: echo "Dry run complete; no files were uploaded to Modrinth or GitHub"
